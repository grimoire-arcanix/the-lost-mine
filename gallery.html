<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Lost Mine | Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Uncial+Antiqua&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header compact-header">
      <div class="container">
        <p class="eyebrow">The Codex</p>
        <h1>Gallery</h1>
        <p class="subtitle">Photo Archive</p>

        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html">Chronicle</a>
          <a href="heroes.html">Heroes</a>
          <a href="gallery.html" class="active">Gallery</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      <section class="page-lead">
        <h2>The Visual Archive</h2>
        <p>
          Use this page for maps, party art, item art, session posters, faction symbols,
          or screenshots of memorable moments.
        </p>
      </section>

      <section class="gallery-grid">
        <figure class="gallery-card">
          <img src="assets/img/gallery-placeholder.jpg" alt="Placeholder gallery item" />
          <figcaption>Map or illustration caption goes here.</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="assets/img/gallery-placeholder.jpg" alt="Placeholder gallery item" />
          <figcaption>Another campaign image or scene description.</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="assets/img/gallery-placeholder.jpg" alt="Placeholder gallery item" />
          <figcaption>Portrait, relic, faction mark, or battlefield image.</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="assets/img/gallery-placeholder.jpg" alt="Placeholder gallery item" />
          <figcaption>Use as many as needed once the real assets are ready.</figcaption>
        </figure>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>The Lost Mine c 2026 Bhargav Dave</p>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
